  <script type="text/babel">
    const { useState, useEffect, useRef } = React;


    // --- Firebase 초기화 ---
    const firebaseConfig = {

    // --- SVG 아이콘 ---
    const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

    const FileSpreadsheet = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line><line x1="12" y1="13" x2="12" y2="17"></line></svg>;
    const Plus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const X = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const Printer = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const Download = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;


    // --- 요금 산정 상수 ---
    const STADIUM_PRICES = {
      '문학 주육상장': {
        '체육 외': { '조기 (06:00~09:00)': [150000, 225000], '주간 (09:00~18:00)': [300000, 450000], '야간 (18:00~23:00)': [450000, 675000] },
        '체육': { '조기 (06:00~09:00)': [50000, 75000], '주간 (09:00~18:00)': [100000, 150000], '야간 (18:00~23:00)': [150000, 225000] }
      },
      '문학 보조육상장': {
        '체육 외': { '조기 (06:00~09:00)': [150000, 225000], '주간 (09:00~18:00)': [300000, 450000], '야간 (18:00~23:00)': [450000, 675000] },
        '체육': { '조기 (06:00~09:00)': [50000, 75000], '주간 (09:00~18:00)': [100000, 150000], '야간 (18:00~23:00)': [150000, 225000] }
      },
      '문학 주축구장': {
        '체육 외': { '조기 (06:00~09:00)': [500000, 750000], '주간 (09:00~18:00)': [1000000, 1500000], '야간 (18:00~23:00)': [1500000, 2250000] },
        '체육': { '조기 (06:00~09:00)': [250000, 375000], '주간 (09:00~18:00)': [500000, 750000], '야간 (18:00~23:00)': [750000, 1125000] }
      },
      '문학 보조축구장': {
        '체육 외': { '조기 (06:00~09:00)': [250000, 375000], '주간 (09:00~18:00)': [500000, 750000], '야간 (18:00~23:00)': [750000, 1125000] },
        '체육': { '조기 (06:00~09:00)': [100000, 150000], '주간 (09:00~18:00)': [200000, 300000], '야간 (18:00~23:00)': [300000, 450000] }
      },
      '문학 야구장': {
        '체육 외': { '조기 (06:00~09:00)': [100000, 150000], '주간 (09:00~18:00)': [200000, 300000], '야간 (18:00~23:00)': [300000, 450000] },
        '체육': { '조기 (06:00~09:00)': [50000, 75000], '주간 (09:00~18:00)': [100000, 150000], '야간 (18:00~23:00)': [150000, 225000] }
      }
    };


    const RESTORATION_FEE_PER_DAY = 550000;
    const PROMO_COMMERCIAL_FEE_PER_SQM = 1400;


    const formatCurrency = (num) => Math.round(num).toLocaleString('ko-KR');


    const getTodayFormatted = (format = 'word') => {
      const d = new Date();
      if (format === 'excel') return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
    };


    const numberToKorean = (num) => {
      const numStr = String(Math.round(num));
      const hanA = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
      const danA = ["", "십", "백", "천"];
      const danG = ["", "만", "억", "조"];
      let result = "";
      for (let i = 0; i < numStr.length; i++) {
        const str = numStr.substring(numStr.length - 1 - i, numStr.length - i);
        if (str !== "0") result = hanA[str] + danA[i % 4] + result;
        if (i % 4 === 0) {
          const chunk = numStr.substring(Math.max(0, numStr.length - 1 - i - 3), numStr.length - i);
          if (parseInt(chunk) > 0) result = danG[i / 4] + result;
        }
      }
      return result || "영";
    };


    // --- HTML -> MS Office 변환 함수 ---
    const exportHTMLToDoc = (elementId, filename = '', type = 'word') => {
      const element = document.getElementById(elementId);
      if (!element) return;


      const getBase64Image = (img) => {
        const canvas = document.createElement("canvas");
        canvas.width = img.width || img.naturalWidth || 100;
        canvas.height = img.height || img.naturalHeight || 50;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/png");
      };
      
      const clone = element.cloneNode(true);
      
      const images = clone.getElementsByTagName('img');
      for (let i = 0; i < images.length; i++) {
        const img = images[i];
        const originalImg = document.getElementById(img.id);
        if(originalImg && originalImg.complete) {
            try { img.src = getBase64Image(originalImg); } 
            catch(e) { console.warn("이미지 변환 실패:", e); }
        }
      }


      const ext = type === 'word' ? 'doc' : 'xls';
      const mime = type === 'word' ? 'application/msword' : 'application/vnd.ms-excel';
      const officeType = type === 'word' ? 'word' : 'excel';
      
      const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:${officeType}' xmlns='http://www.w3.org/TR/REC-html40'>
      <head>
        <meta charset='utf-8'>
        <title>Export</title>
        <style>
          body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; color: #000; }
          table { border-collapse: collapse; }
          br { mso-data-placement: same-cell; }
        </style>
      </head>
      <body>`;
      const postHtml = "</body></html>";
      
      const html = preHtml + clone.innerHTML + postHtml;


      const blob = new Blob(['\ufeff', html], { type: mime });
      const url = URL.createObjectURL(blob);
      const downloadLink = document.createElement("a");
      
      downloadLink.href = url;
      downloadLink.download = filename ? `${filename}.${ext}` : `document.${ext}`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      URL.revokeObjectURL(url);
    };


    // --- 메인 App 컴포넌트 ---
    function App() {
      const [activeTab, setActiveTab] = useState('register');
      const [rentals, setRentals] = useState([]);
      const [selectedRental, setSelectedRental] = useState(null);
      const [docModal, setDocModal] = useState({ isOpen: false, type: '', rental: null });


      const [formCategory, setFormCategory] = useState('경기장 대관');
      const [formTitle, setFormTitle] = useState('');
      const [formPurposeType, setFormPurposeType] = useState('체육경기 외');
      const [formDateType, setFormDateType] = useState('개별');
      const [formDates, setFormDates] = useState([{ date: '', endDate: '', location: '문학 주육상장', area: '', time: '주간 (09:00~18:00)', days: 1 }]);
      
      // 인원 수 상태 추가
      const [formHeadcount, setFormHeadcount] = useState('');
      
      const [formPaymentDeadline, setFormPaymentDeadline] = useState('');
      const [formRecipient, setFormRecipient] = useState('');
      const [formRestoration, setFormRestoration] = useState(false);
      const [currentDate, setCurrentDate] = useState(new Date());
      
      const pressTimer = useRef(null);


      // --- Firebase 연동 ---
      useEffect(() => {
        firebase.auth().signInAnonymously().catch(err => console.log("Auth Optional:", err.message));
        
        const unsubscribe = db.collection('rentals').onSnapshot(
          (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.createdAt - a.createdAt);
            setRentals(data);
          },
          (err) => {
            console.error("Firestore 읽기 오류:", err);
            alert("데이터베이스 접근 권한 오류가 발생했습니다. (Firebase Rules를 확인하세요)");
          }
        );
        return () => unsubscribe();
      }, []);


      const addDateRow = () => {
        if (formDates.length < 10) setFormDates([...formDates, { date: '', endDate: '', location: '문학 주육상장', area: '', time: '주간 (09:00~18:00)', days: 1 }]);
        else alert('개별 날짜는 최대 10개까지 추가할 수 있습니다.');
      };


      const updateDateRow = (index, field, value) => {
        const newDates = [...formDates];
        newDates[index][field] = value;
        setFormDates(newDates);
      };


      const removeDateRow = (index) => {
        if (formDates.length > 1) setFormDates(formDates.filter((_, i) => i !== index));
      };


      // 일정 등록
      const handleRegister = (e) => {
        e.preventDefault();
        if (!formTitle || !formPaymentDeadline || !formRecipient) return alert('필수 항목을 모두 입력해주세요.');
        
        // 경기장 대관일 경우 인원수 필수 검증
        if (formCategory === '경기장 대관' && !formHeadcount) {
          return alert('경기장 사용 인원을 필수로 입력해주세요.');
        }
        
        const newRental = {
          category: formCategory, 
          title: formTitle, 
          purposeType: formPurposeType, 
          dateType: formDateType, 
          dates: [...formDates], 
          paymentDeadline: formPaymentDeadline, 
          recipient: formRecipient, 
          restorationFee: formRestoration, 
          paymentDate: '', 
          docsReceived: false, 
          docsSent: false, 
          suspenseReceipt: false, 
          taxInvoice: false, 
          incomeResolution: false, 
          allComplete: false, 
          createdAt: Date.now(),
          headcount: formCategory === '경기장 대관' ? formHeadcount : null // 인원수 추가
        };


        db.collection('rentals').add(newRental).then(() => {
          alert('대관 일정이 등록되었습니다.');
          setFormTitle(''); setFormPaymentDeadline(''); setFormRecipient(''); setFormRestoration(false); setFormHeadcount('');
          setFormDates([{ date: '', endDate: '', location: '문학 주육상장', area: '', time: '주간 (09:00~18:00)', days: 1 }]);
        }).catch(err => alert("등록 중 오류가 발생했습니다: " + err.message));
      };


      // 일정 삭제
      const handleDelete = (rental) => {
        if (window.confirm(`'${rental.title}' 대관 일정을 정말 삭제하시겠습니까?\n삭제 시 전체 목록에서도 완전히 사라집니다.`)) {
          db.collection('rentals').doc(rental.id).delete()
            .then(() => alert('정상적으로 삭제되었습니다.'))
            .catch(err => alert('삭제 실패: ' + err.message));
        }
      };


      // 꾹 누르기 (Long Press)
      const startPress = (rental) => {
        pressTimer.current = setTimeout(() => {
          handleDelete(rental);
        }, 800);
      };


      const cancelPress = () => {
        if (pressTimer.current) {
          clearTimeout(pressTimer.current);
          pressTimer.current = null;
        }
      };


      const updateRentalStatus = (id, field, value) => {
        db.collection('rentals').doc(id).update({ [field]: value });
      };


      const checkIsAlert = (rental) => {
        const hasPaymentDate = rental.paymentDate && rental.paymentDate.trim() !== '';
        const allCheckboxes = rental.docsReceived && rental.docsSent && rental.suspenseReceipt && rental.taxInvoice && rental.incomeResolution;
        return !(hasPaymentDate && (rental.allComplete || allCheckboxes));
      };


      const calculateFees = (rental) => {
        let items = [];
        let totalBaseFee = 0;
        let totalCommercialFee = 0;
        let totalRestorationFee = 0;


        rental.dates.forEach(d => {
          let daysCount = 1;
          let isWeekend = false;
          if (d.date) {
            const dateObj = new Date(d.date);
            isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
            if (rental.dateType === '기간' && d.endDate) {
              daysCount = Math.max(1, Math.floor((new Date(d.endDate) - dateObj) / (1000 * 60 * 60 * 24)) + 1);
            } else if (d.days && d.days > 1) daysCount = parseInt(d.days);
          }


          if (rental.category === '프로모션') {
            const area = parseFloat(d.area) || 0;
            let baseRate = (d.location === '동문광장' ? 746032.11 : 758770.47) / 13351;
            const currentBase = baseRate * area * daysCount;
            const currentComm = PROMO_COMMERCIAL_FEE_PER_SQM * area * daysCount;
            totalBaseFee += currentBase;
            totalCommercialFee += currentComm;


            items.push({
              name: `대관사용료<br/>(${d.location === '북문광장' ? '프론티어스퀘어' : d.location})`,
              unitText: `1일, 1㎡<br/>${(Math.round(baseRate*10)/10).toFixed(1)}원`,
              qtyText: `${daysCount}일, ${area}㎡`,
              total: Math.round(currentBase), note: ''
            });
            items.push({
              name: `상업사용료`, unitText: `1일, 1㎡<br/>1,400원`,
              qtyText: `${daysCount}일, ${area}㎡`, total: Math.round(currentComm), note: ''
            });
          } else {
            const times = d.time === '종일 (06:00~23:00)' ? ['조기 (06:00~09:00)', '주간 (09:00~18:00)', '야간 (18:00~23:00)'] : [d.time];
            let dayFee = 0;
            let unitTexts = [];
            times.forEach(t => {
              if(STADIUM_PRICES[d.location]?.[rental.purposeType]?.[t]) {
                const p = isWeekend ? STADIUM_PRICES[d.location][rental.purposeType][t][1] : STADIUM_PRICES[d.location][rental.purposeType][t][0];
                dayFee += p;
                unitTexts.push(`${isWeekend?'주말':'평일'} ${t.split(' ')[0]}<br/>${formatCurrency(p)}원`);
              }
            });
            const totalItemFee = dayFee * daysCount;
            totalBaseFee += totalItemFee;


            items.push({
              name: `대관사용료<br/>(${d.location})`,
              unitText: unitTexts.join('<br/>'), qtyText: `${daysCount}일`,
              total: totalItemFee, note: ''
            });
          }
        });


        if (rental.restorationFee) {
          let totalDays = rental.dateType === '기간' 
            ? Math.max(1, Math.floor((new Date(rental.dates[0].endDate) - new Date(rental.dates[0].date)) / (1000 * 60 * 60 * 24)) + 1)
            : rental.dates.reduce((acc, d) => acc + (parseInt(d.days) || 1), 0);
          const currentRest = RESTORATION_FEE_PER_DAY * totalDays;
          totalRestorationFee += currentRest;
          items.push({
            name: `원상복구 예치금`, unitText: `1일<br/>550,000원`,
            qtyText: `${totalDays}일`, total: currentRest, note: '행사 종료 후 반환'
          });
        }
        return { items, totalBaseFee, totalCommercialFee, totalRestorationFee, grandTotal: Math.round(totalBaseFee + totalCommercialFee + totalRestorationFee) };
      };


      const openDoc = (type) => {
        if (!selectedRental) return alert('먼저 목록에서 대관 일정을 선택해주세요.');
        if (activeTab === 'promotion' && selectedRental.category !== '프로모션') return alert('선택된 항목이 프로모션 대관이 아닙니다.');
        if (activeTab === 'stadium' && selectedRental.category !== '경기장 대관') return alert('선택된 항목이 경기장 대관이 아닙니다.');
        setDocModal({ isOpen: true, type, rental: selectedRental });
      };


      const renderWordTemplate = (r, fees) => {
        const isPromo = r.category === '프로모션';
        const dateStr = r.dates.map(d => r.dateType === '기간' ? `${d.date}~${d.endDate}` : d.date).join(', ');
        const locStr = Array.from(new Set(r.dates.map(d => d.location))).join(', ');
        const docNumber = Math.floor(Math.random() * 100) + 50;


        return (
          <div id="export-area" style={{ width: '100%', fontFamily: "'Malgun Gothic', '맑은 고딕', sans-serif", fontSize: '11pt', color: 'black', lineHeight: '1.6' }}>

                  <td style={{ border: 'none', textAlign: 'left' }}>전 화</td>
                  <td style={{ border: 'none', textAlign: 'left' }}>032)455-2620</td>
                  <td style={{ border: 'none', textAlign: 'left' }}>팩 스 032)455-2699</td>
                </tr>
                <tr><td colSpan="7" style={{ height: '20px' }}></td></tr>
                
                <tr>
                  <td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold' }}>합 계(VAT 포함)</td>

        return (

                          const [key, label] = item.split(':');
                          return (
                            <label key={key} className="flex items-center gap-1.5 cursor-pointer">
                              <input type="checkbox" className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4" checked={rental[key] || false} onChange={(e) => updateRentalStatus(rental.id, key, e.target.checked)} />
                              <span className={`${key === 'allComplete' ? 'font-bold text-blue-700' : 'text-gray-700'}`}>{label}</span>
                            </label>
                          )
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };


      const renderCalendar = () => {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const days = Array.from({length: firstDay}, () => null).concat(Array.from({length: daysInMonth}, (_, i) => i + 1));


        return (
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mt-8">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-lg font-bold flex items-center gap-2"><CalendarIcon className="w-5 h-5 text-blue-600" /> {year}년 {month + 1}월 대관 현황</h2>
              <div className="flex gap-2">
                <button type="button" onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="px-3 py-1 border rounded hover:bg-gray-50">&lt;</button>
                <button type="button" onClick={() => setCurrentDate(new Date())} className="px-3 py-1 border rounded hover:bg-gray-50">오늘</button>
                <button type="button" onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="px-3 py-1 border rounded hover:bg-gray-50">&gt;</button>
              </div>

            <div className="grid grid-cols-7 gap-px bg-gray-200 border border-gray-200">
              {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                <div key={d} className={`bg-gray-50 text-center py-2 text-sm font-medium ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-700'}`}>{d}</div>
              ))}
              {days.map((day, i) => {
                if (!day) return <div key={`empty-${i}`} className="bg-white min-h-[100px]"></div>;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayRentals = rentals.filter(r => r.dates.some(d => r.dateType === '개별' ? d.date === dateStr : (dateStr >= d.date && dateStr <= d.endDate)));
                return (
                  <div key={day} className="bg-white min-h-[100px] p-2 flex flex-col border-t border-gray-100">
                    <span className={`text-sm mb-1 ${i%7===0?'text-red-500':i%7===6?'text-blue-500':'text-gray-700'}`}>{day}</span>
                    <div className="flex flex-col gap-1 overflow-y-auto max-h-[80px]">
                      {dayRentals.map(r => (
                        <div 
                          key={r.id} 
                          title="꾹 누르면 일정이 삭제됩니다."
                          className={`text-xs px-1.5 py-1 rounded truncate select-none cursor-pointer transition-transform active:scale-95 ${r.category === '프로모션' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'}`}
                          onMouseDown={() => startPress(r)}
                          onMouseUp={cancelPress}
                          onMouseLeave={cancelPress}
                          onTouchStart={() => startPress(r)}
                          onTouchEnd={cancelPress}
                        >
                          {r.title}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="text-xs text-gray-500 mt-3">* 캘린더에 등록된 일정을 <strong>꾹 누르면</strong> 해당 대관 건을 삭제할 수 있습니다.</p>
          </div>
        );
      };


      return (
        <div className="min-h-screen pb-20">
          <header className="bg-blue-900 text-white p-6 shadow-md">
            <div className="max-w-7xl mx-auto flex items-center justify-between">

              <div className="space-y-8 animate-in fade-in duration-300">
                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="bg-gray-50 px-6 py-4 border-b border-gray-200">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><Plus className="w-5 h-5 text-blue-600" /> 신규 대관 등록</h2>
                  </div>
                  <form onSubmit={handleRegister} className="p-6 space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="space-y-4 md:col-span-2">
                        <div className="flex flex-col sm:flex-row gap-4">
                          <div className="w-48 shrink-0">
                            <label className="block text-sm font-semibold text-gray-700 mb-1">대관 분류</label>
                            <select className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formCategory} onChange={e => setFormCategory(e.target.value)}>
                              <option value="프로모션">프로모션</option>
                              <option value="경기장 대관">경기장 대관</option>
                            </select>
                          </div>
                          <div className="w-48 shrink-0">
                            <label className="block text-sm font-semibold text-gray-700 mb-1">체육경기 여부</label>
                            <select className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formPurposeType} onChange={e => setFormPurposeType(e.target.value)}>
                              <option value="체육경기 외">체육경기 외</option>
                              <option value="체육경기">체육경기</option>
                            </select>
                          </div>
                          <div className="flex-1 w-full">
                            <label className="block text-sm font-semibold text-gray-700 mb-1">대관 명 (제목)</label>
                            <input type="text" required placeholder="예: 스타벅스데이 프로모션 등" className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formTitle} onChange={e => setFormTitle(e.target.value)} />
                          </div>
                        </div>
                      </div>


                      <div className="md:col-span-2 border-t pt-6">
                        <div className="flex items-center justify-between mb-4">
                          <div className="flex items-center gap-4">
                            <label className="block text-sm font-semibold text-gray-700">날짜 지정 방식</label>
                            <select className="border-gray-300 border p-2 rounded-md shadow-sm text-sm" value={formDateType} onChange={e => { setFormDateType(e.target.value); setFormDates([formDates[0]]); }}>
                              <option value="개별">개별 날짜 지정 (최대 10개)</option>
                              <option value="기간">기간 지정 (시작일~종료일)</option>
                            </select>
                          </div>
                          {formDateType === '개별' && (
                            <button type="button" onClick={addDateRow} className="text-sm bg-blue-50 text-blue-600 px-3 py-1.5 rounded-md font-medium flex items-center gap-1"><Plus className="w-4 h-4"/> 날짜 추가</button>
                          )}
                        </div>
                        <div className="space-y-3">
                          {formDates.map((d, i) => (
                            <div key={i} className="flex flex-wrap items-center gap-3 bg-gray-50 p-3 rounded-lg border border-gray-200">
                              {formDateType === '기간' ? (
                                <><input type="date" required className="border-gray-300 border p-2 rounded-md text-sm" value={d.date} onChange={e => updateDateRow(i, 'date', e.target.value)} />
                                  <span>~</span>
                                  <input type="date" required className="border-gray-300 border p-2 rounded-md text-sm" value={d.endDate} onChange={e => updateDateRow(i, 'endDate', e.target.value)} /></>
                              ) : (
                                <input type="date" required className="border-gray-300 border p-2 rounded-md text-sm" value={d.date} onChange={e => updateDateRow(i, 'date', e.target.value)} />
                              )}
                              <select className="border-gray-300 border p-2 rounded-md text-sm" value={d.location} onChange={e => updateDateRow(i, 'location', e.target.value)}>
                                {['문학 주육상장', '문학 주축구장', '문학 보조육상장', '문학 보조축구장', '동문광장', '북문광장', '문학 야구장'].map(l => <option key={l} value={l}>{l}</option>)}
                              </select>
                              {(d.location === '동문광장' || d.location === '북문광장') && (
                                <input type="number" placeholder="면적 (㎡)" className="w-24 border-gray-300 border p-2 rounded-md text-sm" value={d.area} onChange={e => updateDateRow(i, 'area', e.target.value)} required/>
                              )}
                              {formCategory === '경기장 대관' ? (
                                <select className="border-gray-300 border p-2 rounded-md text-sm" value={d.time} onChange={e => updateDateRow(i, 'time', e.target.value)}>
                                  {['조기 (06:00~09:00)', '주간 (09:00~18:00)', '야간 (18:00~23:00)', '종일 (06:00~23:00)'].map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                              ) : (
                                <div className="flex items-center gap-2"><input type="number" placeholder="일 수" min="1" className="w-20 border-gray-300 border p-2 rounded-md text-sm" value={d.days} onChange={e => updateDateRow(i, 'days', e.target.value)} /><span className="text-sm">일</span></div>
                              )}
                              {formDateType === '개별' && formDates.length > 1 && (
                                <button type="button" onClick={() => removeDateRow(i)} className="text-red-500 ml-auto p-1 bg-red-50 rounded"><Trash2 className="w-4 h-4" /></button>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>


                      {/* 하단 입력 폼 (조건부 열 분할) */}
                      <div className={`md:col-span-2 border-t pt-6 grid grid-cols-1 gap-6 ${formCategory === '경기장 대관' ? 'sm:grid-cols-4' : 'sm:grid-cols-3'}`}>
                        
                        {/* 사용 인원 폼 (경기장 대관 시에만 나타남) */}
                        {formCategory === '경기장 대관' && (
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">사용 인원 (명)</label>
                            <input type="number" required min="1" placeholder="예: 30" className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formHeadcount} onChange={e => setFormHeadcount(e.target.value)} />
                          </div>
                        )}


                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-1">수신자 명</label>
                          <input type="text" required placeholder="예: 런클리어, 스타벅스 등" className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formRecipient} onChange={e => setFormRecipient(e.target.value)} />
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-1">입금기한</label>
                          <input type="date" required className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formPaymentDeadline} onChange={e => setFormPaymentDeadline(e.target.value)} />
                        </div>
                        <div className="flex items-center h-full pt-6">
                          <label className="flex items-center gap-2 cursor-pointer p-3 border rounded-lg bg-gray-50 w-full">
                            <input type="checkbox" className="rounded text-blue-600 w-5 h-5" checked={formRestoration} onChange={e => setFormRestoration(e.target.checked)} />
                            <span className="font-semibold text-gray-700 text-sm whitespace-nowrap">복구비 부과</span>
                          </label>
                        </div>
                      </div>


                    </div>
                    <div className="pt-4 flex justify-end">
                      <button type="submit" className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-blue-700">대관 일정 등록하기</button>
                    </div>
                  </form>
                </div>
                {renderCalendar()}
              </div>
            )}


            {(activeTab === 'promotion' || activeTab === 'stadium') && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="flex justify-between items-end bg-white p-4 rounded-xl shadow-sm border">
                  <div>
                    <h2 className="text-xl font-black text-gray-800">{activeTab === 'promotion' ? '프로모션 대관 목록' : '경기장 대관 목록'}</h2>
                    <p className="text-sm text-gray-500 mt-1">대관 건을 클릭하여 선택한 후, 우측의 문서 작성 버튼을 이용하세요.</p>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => openDoc('word')} className="flex items-center gap-2 bg-blue-50 text-blue-700 border border-blue-200 px-4 py-2 rounded-lg font-semibold hover:bg-blue-100"><FileText className="w-5 h-5" /> 수신 공문 작성</button>
                    <button onClick={() => openDoc('excel')} className="flex items-center gap-2 bg-green-50 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-semibold hover:bg-green-100"><FileSpreadsheet className="w-5 h-5" /> 견적서 작성</button>
                  </div>
                </div>
                {renderList(activeTab === 'promotion' ? '프로모션' : '경기장 대관')}
              </div>
            )}
          </main>


          {/* 모달 창 */}
          {docModal.isOpen && docModal.rental && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-gray-100 w-full max-w-4xl max-h-[90vh] rounded-xl shadow-2xl flex flex-col overflow-hidden">
                <div className="bg-white px-6 py-4 border-b flex justify-between items-center shrink-0">
                  <h3 className="text-lg font-bold flex items-center gap-2">
                    {docModal.type === 'word' ? <FileText className="text-blue-600 w-5 h-5"/> : <FileSpreadsheet className="text-green-600 w-5 h-5"/>}
                    {docModal.type === 'word' ? '수신 공문 미리보기' : '견적서 미리보기'}
                  </h3>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => exportHTMLToDoc('export-area', `${docModal.rental.recipient}_${docModal.rental.title}`, docModal.type)} 
                      className="bg-blue-600 text-white px-4 py-2 rounded flex items-center gap-2 text-sm hover:bg-blue-700 font-semibold shadow-sm"
                    >
                      <Download className="w-4 h-4"/> 
                      {docModal.type === 'word' ? 'Word(.doc) 다운로드' : 'Excel(.xls) 다운로드'}
                    </button>
                    <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded flex items-center gap-2 text-sm hover:bg-gray-700">
                      <Printer className="w-4 h-4"/> 인쇄/PDF
                    </button>
                    <button onClick={() => setDocModal({ isOpen: false, type: '', rental: null })} className="bg-gray-200 text-gray-700 p-2 rounded hover:bg-gray-300 ml-2">
                      <X className="w-5 h-5"/>
                    </button>
                  </div>
                </div>


                <div className="flex-1 overflow-auto p-8 bg-gray-200">
                  <div className="bg-white mx-auto shadow-sm text-black relative" style={{ width: '210mm', minHeight: '297mm', padding: '25mm', boxSizing: 'border-box' }}>
                    {docModal.type === 'word' 
                      ? renderWordTemplate(docModal.rental, calculateFees(docModal.rental))
                      : renderExcelTemplate(docModal.rental, calculateFees(docModal.rental))
                    }
                  </div>
                </div>
                
                <style dangerouslySetInnerHTML={{__html: `
                  @media print {
                    body * { visibility: hidden; }
                    #export-area, #export-area * { visibility: visible; }
                    #export-area { position: absolute; left: 0; top: 0; width: 100%; overflow: visible; padding: 0;}
                    .bg-gray-100 { background: white !important; }
                  }
                `}} />
              </div>
            </div>
          )}
        </div>
      );
    }


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>




```
