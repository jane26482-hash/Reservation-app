    const numberToKorean = (num) => {
      const numStr = String(Math.round(num));
      const hanA = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
      const danA = ["", "십", "백", "천"];
      const danG = ["", "만", "억", "조"];
      let result = "";
      for (let i = 0; i < numStr.length; i++) {
        const str = numStr.substring(numStr.length - 1 - i, numStr.length - i);
        if (str !== "0") result = hanA[str] + danA[i % 4] + result;
        if (i % 4 === 0) {
          const chunk = numStr.substring(Math.max(0, numStr.length - 1 - i - 3), numStr.length - i);
          if (parseInt(chunk) > 0) result = danG[i / 4] + result;
        }
      }
      return result || "영";
    };

    // --- HTML -> MS Office 변환 함수 ---
    const exportHTMLToDoc = (elementId, filename = '', type = 'word') => {
      const element = document.getElementById(elementId);
      if (!element) return;

      const getBase64Image = (img) => {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth || img.width || 150;
        canvas.height = img.naturalHeight || img.height || 90;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/png");
      };
      
      const clone = element.cloneNode(true);
      
      const images = clone.getElementsByTagName('img');
      for (let i = 0; i < images.length; i++) {
        const img = images[i];
        const originalImg = document.getElementById(img.id);
        if(originalImg && originalImg.complete) {
            try { 
              img.src = getBase64Image(originalImg); 
              if (img.id === 'ssg-logo') {
                const targetHeight = 65; 
                const ratio = (originalImg.naturalWidth || 150) / (originalImg.naturalHeight || 90);
                img.setAttribute('height', targetHeight);
                img.setAttribute('width', Math.round(targetHeight * ratio));
              }
            } 
            catch(e) { console.warn("이미지 변환 실패:", e); }
        }
      }

      const ext = type === 'word' ? 'doc' : 'xls';
      const mime = type === 'word' ? 'application/msword' : 'application/vnd.ms-excel';
      const officeType = type === 'word' ? 'word' : 'excel';
      
      const fontStyle = type === 'word' ? "'에브리데이고딕 L', 'Malgun Gothic', sans-serif" : "'Malgun Gothic', '맑은 고딕', sans-serif";
      
      const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:${officeType}' xmlns='http://www.w3.org/TR/REC-html40'>
      <head>
        <meta charset='utf-8'>
        <title>Export</title>
        <style>
          body { font-family: ${fontStyle}; color: #000; margin: 0; padding: 0; }
          table { border-collapse: collapse; margin: 0; padding: 0; }
          td, th, p, span, div { margin: 0pt; padding: 0pt; mso-line-height-rule: exactly; text-align: justify; text-justify: inter-ideograph; word-break: keep-all; }
          p { margin-top: 0pt !important; margin-bottom: 0pt !important; text-align: justify; text-justify: inter-ideograph; }
          br { mso-data-placement: same-cell; }
        </style>
      </head>
      <body>`;
      const postHtml = "</body></html>";
      
      const html = preHtml + clone.innerHTML + postHtml;

      const blob = new Blob(['\ufeff', html], { type: mime });
      const url = URL.createObjectURL(blob);
      const downloadLink = document.createElement("a");
      
      downloadLink.href = url;
      downloadLink.download = filename ? `${filename}.${ext}` : `document.${ext}`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      URL.revokeObjectURL(url);
    };

        return !(hasPaymentDate && (rental.allComplete || allCheckboxes));

      // --- 소계 계산 함수 ---
      const calculateFees = (rental) => {
        let itemsA = []; let itemsB = []; let itemsC = []; let itemsD = [];
        let feeA = 0; let feeB = 0; let feeC = 0; let feeD = 0;
        let totalDays = 0;
        const agg = {};

        rental.dates.forEach(d => {
            let daysCount = 1;
            let weekdayCount = 0;
            let weekendCount = 0;

            if (rental.dateType === '기간' && d.endDate) {
                const start = new Date(d.date);
                const end = new Date(d.endDate);
                daysCount = Math.max(1, Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1);
                totalDays += daysCount;
                for(let i=0; i<daysCount; i++) {
                    const cur = new Date(start.getTime() + i * 24*60*60*1000);
                    const day = cur.getDay();
                    if(day === 0 || day === 6) weekendCount++;
                    else weekdayCount++;
                }
            } else {
                daysCount = parseInt(d.days) || 1;
                totalDays += daysCount;
                const dateObj = new Date(d.date);
                const isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
                if (isWeekend) weekendCount = daysCount;
                else weekdayCount = daysCount;
            }

            if (rental.category === '프로모션') {
                const area = parseFloat(d.area) || 0;
                let baseRate = (d.location === '동문광장' ? 746032.11 : 758770.47) / 13351;
                const currentBase = baseRate * area * daysCount;
                feeA += currentBase;
                itemsA.push({
                  name: `대관사용료<br/>(${d.location === '북문광장' ? '프론티어스퀘어' : d.location})`,
                  unitText: `1일, 1㎡<br/>${(Math.round(baseRate*10)/10).toFixed(1)}원`,
                  qtyText: `${daysCount}일, ${area}㎡`,
                  total: Math.round(currentBase), note: ''
                });
            } else if (rental.category !== '야구단행사') {
                const times = d.time === '종일 (06:00~23:00)' ? ['조기 (06:00~09:00)', '주간 (09:00~18:00)', '야간 (18:00~23:00)'] : [d.time];
                times.forEach(t => {
                    const timeLabel = t.split(' ')[0];
                    const pWeek = STADIUM_PRICES[d.location]?.[rental.purposeType]?.[t]?.[0];
                    const pEnd = STADIUM_PRICES[d.location]?.[rental.purposeType]?.[t]?.[1];
                    
                    if (weekdayCount > 0 && pWeek) {
                        const key = `${d.location}|${timeLabel}|weekday`;
                        if (!agg[key]) agg[key] = { location: d.location, timeLabel, type: '평일', price: pWeek, count: 0 };
                        agg[key].count += weekdayCount;
                    }
                    if (weekendCount > 0 && pEnd) {
                        const key = `${d.location}|${timeLabel}|weekend`;
                        if (!agg[key]) agg[key] = { location: d.location, timeLabel, type: '주말', price: pEnd, count: 0 };
                        agg[key].count += weekendCount;
                    }
                });
            }
        });

        if (rental.category !== '프로모션' && rental.category !== '야구단행사') {
            Object.values(agg).forEach(g => {
                const totalItemFee = g.price * g.count;
                feeA += totalItemFee; 
                itemsA.push({
                    name: `[체육시설] 전용사용료<br/>(${getOfficialLocationName(g.location)})`,
                    unitText: `${g.type} ${g.timeLabel}<br/>${formatCurrency(g.price)}원`,
                    qtyText: `${g.count}일`,
                    total: totalItemFee,
                    note: ''
                });
            });
        }

        if (rental.facUsage) {
          const amt = (parseInt(rental.facRooms)||0) * (parseInt(rental.facHours)||0) * UNIT_PRICE_FAC_ROOM_HOUR;
          feeB += amt;
          itemsB.push({ name: '부속시설 사용료', unitText: `1실 1시간<br/>${formatCurrency(UNIT_PRICE_FAC_ROOM_HOUR)}원`, qtyText: `${rental.facRooms}실, ${rental.facHours}시간`, total: amt, note: '' });
        }
        if (rental.waterUsage) {
          const amt = parseInt(rental.waterAmount) || 0;
          feeB += amt;
          itemsB.push({ name: '부속시설 (상하수도 요금)', unitText: '-', qtyText: `1식`, total: amt, note: '' });
        }
        if (rental.elecUsage) {
          const amt = parseInt(rental.elecAmount) || 0;
          feeB += amt;
          itemsB.push({ name: '부속시설 (전기사용료)', unitText: '-', qtyText: `1식`, total: amt, note: '' });
        }

        if (rental.commercialUsage) {
            const area = parseFloat(rental.commercialArea) || 0;
            const commAmt = totalDays * area * 1400;
            feeC += commAmt;
            itemsC.push({
                name: `상업사용료`, unitText: `1일, 1㎡<br/>1,400원`,
                qtyText: `${totalDays}일, ${area}㎡`, total: Math.round(commAmt), note: ''
            });
        }

        if (rental.restorationFee) {
          const customFee = parseInt(rental.restorationAmount) || 0;
          const usageCount = totalDays > 0 ? totalDays : 1;
          const amt = customFee * usageCount;
          feeD += amt;
          itemsD.push({ name: '원상복구 예치금', unitText: `1회(일)<br/>${formatCurrency(customFee)}원`, qtyText: `${usageCount}회(일)`, total: amt, note: '행사 종료 후 반환' });
        }

        feeA = Math.floor(feeA / 10) * 10;
        feeB = Math.floor(feeB / 10) * 10;
        feeC = Math.floor(feeC / 10) * 10;
        feeD = Math.floor(feeD / 10) * 10;
        
        let grandTotal = feeA + feeB + feeC + feeD;

        return { itemsA, itemsB, itemsC, itemsD, feeA, feeB, feeC, feeD, grandTotal };

                            <label className="block text-sm font-semibold text-gray-700 mb-1">대관 분류</label>
                            <select className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formCategory} onChange={e => setFormCategory(e.target.value)}>
                              <option value="프로모션">프로모션</option>
                              <option value="경기장 대관">경기장 대관</option>
                              <option value="공연 대관">공연 대관</option>
                              <option value="야구단행사">야구단행사</option>
                            </select>
                          </div>
                          {!isFormBaseball && (
                            <div className="w-48 shrink-0">
                              <label className="block text-sm font-semibold text-gray-700 mb-1">체육경기 여부</label>
                              <select className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formPurposeType} onChange={e => setFormPurposeType(e.target.value)}>
                                <option value="체육경기 외">체육경기 외</option>
                                <option value="체육경기">체육경기</option>
                              </select>
                            </div>
                          )}
                          <div className="flex-1 w-full">
                            <label className="block text-sm font-semibold text-gray-700 mb-1">{isFormBaseball ? '행사명 (제목)' : '대관 명 (제목)'}</label>
                            <input type="text" required placeholder={isFormBaseball ? "예: 야구단 자체 행사" : "예: 스타벅스데이 프로모션 등"} className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formTitle} onChange={e => setFormTitle(e.target.value)} />
                          </div>
                        </div>
                      </div>

                      <div className="md:col-span-2 border-t pt-6">
                        <div className="flex items-center justify-between mb-4">
                          <div className="flex items-center gap-4">
                            <label className="block text-sm font-semibold text-gray-700">날짜 지정 방식</label>
                            <select className="border-gray-300 border p-2 rounded-md shadow-sm text-sm" value={formDateType} onChange={e => { setFormDateType(e.target.value); setFormDates([formDates[0]]); }}>
                              <option value="개별">개별 날짜 지정 (최대 10개)</option>
                              <option value="기간">기간 지정 (시작일~종료일)</option>
                            </select>
                          </div>
                          {formDateType === '개별' && (
                            <button type="button" onClick={addDateRow} className="text-sm bg-blue-50 text-blue-600 px-3 py-1.5 rounded-md font-medium flex items-center gap-1"><Plus className="w-4 h-4"/> 날짜 추가</button>
                          )}
                        </div>
                        <div className="space-y-3">
                          {formDates.map((d, i) => (
                            <div key={i} className="flex flex-wrap items-center gap-3 bg-gray-50 p-3 rounded-lg border border-gray-200">
                              {formDateType === '기간' ? (
                                <><input type="date" required className="border-gray-300 border p-2 rounded-md text-sm" value={d.date} onChange={e => updateDateRow(i, 'date', e.target.value)} />
                                  <span>~</span>
                                  <input type="date" required className="border-gray-300 border p-2 rounded-md text-sm" value={d.endDate} onChange={e => updateDateRow(i, 'endDate', e.target.value)} /></>
                              ) : (
                                <input type="date" required className="border-gray-300 border p-2 rounded-md text-sm" value={d.date} onChange={e => updateDateRow(i, 'date', e.target.value)} />
                              )}
                              <select className="border-gray-300 border p-2 rounded-md text-sm" value={d.location} onChange={e => updateDateRow(i, 'location', e.target.value)}>
                                {['문학 주육상장', '문학 주축구장', '문학 보조육상장', '문학 보조축구장', '동문광장', '북문광장', '문학 야구장'].map(l => <option key={l} value={l}>{l}</option>)}
                              </select>
                              {(d.location === '동문광장' || d.location === '북문광장') && (
                                <input type="number" placeholder="면적 (㎡)" className="w-24 border-gray-300 border p-2 rounded-md text-sm" value={d.area} onChange={e => updateDateRow(i, 'area', e.target.value)} required={!isFormBaseball}/>
                              )}
                              {(formCategory === '경기장 대관' || formCategory === '공연 대관' || isFormBaseball) ? (
                                <select className="border-gray-300 border p-2 rounded-md text-sm" value={d.time} onChange={e => updateDateRow(i, 'time', e.target.value)}>
                                  {['조기 (06:00~09:00)', '주간 (09:00~18:00)', '야간 (18:00~23:00)', '종일 (06:00~23:00)'].map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                              ) : (
                                <div className="flex items-center gap-2"><input type="number" placeholder="일 수" min="1" className="w-20 border-gray-300 border p-2 rounded-md text-sm" value={d.days} onChange={e => updateDateRow(i, 'days', e.target.value)} /><span className="text-sm">일</span></div>
                              )}
                              {formDateType === '개별' && formDates.length > 1 && (
                                <button type="button" onClick={() => removeDateRow(i)} className="text-red-500 ml-auto p-1 bg-red-50 rounded"><Trash2 className="w-4 h-4" /></button>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 야구단행사일 경우 부대비용 및 기타옵션 체크박스 숨김 */}
                      {!isFormBaseball && (
                        <div className="md:col-span-2 border-t pt-6 grid grid-cols-1 lg:grid-cols-4 gap-4">
                          <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <label className="flex items-center gap-2 cursor-pointer mb-2">
                              <input type="checkbox" className="rounded text-blue-600 w-4 h-4" checked={formCommercialUsage} onChange={e => setFormCommercialUsage(e.target.checked)}/>
                              <span className="font-semibold text-sm text-gray-700">상업 사용료 (1,400원/㎡)</span>
                            </label>
                            {formCommercialUsage && (
                              <input type="number" placeholder="사용 면적(㎡)" className="w-full p-2 text-sm border border-gray-300 rounded" value={formCommercialArea} onChange={e => setFormCommercialArea(e.target.value)}/>
                            )}
                          </div>

                          <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <label className="flex items-center gap-2 cursor-pointer mb-2">
                              <input type="checkbox" className="rounded text-blue-600 w-4 h-4" checked={formFacUsage} onChange={e => setFormFacUsage(e.target.checked)}/>
                              <span className="font-semibold text-sm text-gray-700">부속시설 사용료 (실/시간)</span>
                            </label>
                            {formFacUsage && (
                              <div className="flex gap-2">
                                <input type="number" placeholder="실 수" className="w-full p-2 text-sm border border-gray-300 rounded" value={formFacRooms} onChange={e => setFormFacRooms(e.target.value)}/>
                                <input type="number" placeholder="시간" className="w-full p-2 text-sm border border-gray-300 rounded" value={formFacHours} onChange={e => setFormFacHours(e.target.value)}/>
                              </div>
                            )}
                          </div>

                          <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <label className="flex items-center gap-2 cursor-pointer mb-2">
                              <input type="checkbox" className="rounded text-blue-600 w-4 h-4" checked={formWaterUsage} onChange={e => setFormWaterUsage(e.target.checked)}/>
                              <span className="font-semibold text-sm text-gray-700">부속시설 (상하수도 요금)</span>
                            </label>
                            {formWaterUsage && (
                              <input type="number" placeholder="금액 직접 입력 (원)" className="w-full p-2 text-sm border border-gray-300 rounded" value={formWaterAmount} onChange={e => setFormWaterAmount(e.target.value)}/>
                            )}
                          </div>

                          <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <label className="flex items-center gap-2 cursor-pointer mb-2">
                              <input type="checkbox" className="rounded text-blue-600 w-4 h-4" checked={formElecUsage} onChange={e => setFormElecUsage(e.target.checked)}/>
                              <span className="font-semibold text-sm text-gray-700">부속시설 (전기사용료)</span>
                            </label>
                            {formElecUsage && (
                              <input type="number" placeholder="금액 직접 입력 (원)" className="w-full p-2 text-sm border border-gray-300 rounded" value={formElecAmount} onChange={e => setFormElecAmount(e.target.value)}/>
                            )}
                          </div>
                        </div>
                      )}

                      <div className={`md:col-span-2 border-t pt-6 grid grid-cols-1 gap-6 ${isFormBaseball ? 'sm:grid-cols-1' : (formCategory === '경기장 대관' || formCategory === '공연 대관' ? 'sm:grid-cols-4' : 'sm:grid-cols-3')}`}>
                        {(formCategory === '경기장 대관' || formCategory === '공연 대관' || isFormBaseball) && (
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">사용 인원 (명)</label>
                            <input type="number" required={!isFormBaseball} min="1" placeholder="예: 30" className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formHeadcount} onChange={e => setFormHeadcount(e.target.value)} />
                          </div>
                        )}
                        {!isFormBaseball && (
                          <React.Fragment>
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">수신자 명</label>
                              <input type="text" required placeholder="예: 런클리어, 스타벅스 등" className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formRecipient} onChange={e => setFormRecipient(e.target.value)} />
                            </div>
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">입금기한</label>
                              <input type="date" required className="w-full border-gray-300 border p-2 rounded-lg shadow-sm" value={formPaymentDeadline} onChange={e => setFormPaymentDeadline(e.target.value)} />
                            </div>
                            <div className="flex flex-col justify-end h-full">
                              <label className="flex items-center gap-2 cursor-pointer p-3 border rounded-lg bg-gray-50 w-full hover:bg-gray-100 transition-colors">
                                <input type="checkbox" className="rounded text-blue-600 w-5 h-5" checked={formRestoration} onChange={e => setFormRestoration(e.target.checked)} />
                                <span className="font-semibold text-gray-700 text-sm whitespace-nowrap">시설복구비 부과</span>
                              </label>
                              {formRestoration && (
                                <div className="mt-2">
                                  <input type="number" required placeholder="회당 금액 직접입력 (원)" className="w-full border-gray-300 border p-2 rounded-lg shadow-sm text-sm" value={formRestorationAmount} onChange={e => setFormRestorationAmount(e.target.value)} />
                                </div>
                              )}
                            </div>
                          </React.Fragment>
                        )}
                      </div>

                    </div>
                    <div className="pt-4 flex justify-end gap-3 border-t mt-4">
                      {editModeId && (
                        <button type="button" onClick={resetForm} className="bg-gray-200 text-gray-800 px-6 py-3 rounded-xl font-bold text-lg hover:bg-gray-300">
                          수정 취소
                        </button>
                      )}
                      <button type="submit" className={`${editModeId ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'} text-white px-8 py-3 rounded-xl font-bold text-lg`}>
                        {editModeId ? '수정 내용 저장하기' : '대관 일정 등록하기'}
                      </button>
                    </div>
                  </form>
                </div>
                {renderCalendar()}
              </div>
            )}

            {(activeTab === 'promotion' || activeTab === 'stadium' || activeTab === 'performance' || activeTab === 'baseball') && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="flex justify-between items-end bg-white p-4 rounded-xl shadow-sm border">
                  <div>
                    <h2 className="text-xl font-black text-gray-800">
                      {activeTab === 'promotion' ? '프로모션 대관 목록' : activeTab === 'stadium' ? '경기장 대관 목록' : activeTab === 'performance' ? '공연 대관 목록' : '야구단행사 목록'}
                    </h2>
                    <p className="text-sm text-gray-500 mt-1">
                      {activeTab === 'baseball' ? '야구단 자체 행사 및 일정이 간소화되어 표시됩니다.' : '대관 건을 클릭하여 선택한 후, 우측의 문서 작성 버튼을 이용하세요.'}
                    </p>
                  </div>
                  
                  {activeTab !== 'baseball' && (
                    <div className="flex gap-3">
                      <button onClick={() => openDoc('word')} className="flex items-center gap-2 bg-blue-50 text-blue-700 border border-blue-200 px-4 py-2 rounded-lg font-semibold hover:bg-blue-100"><FileText className="w-5 h-5" /> 공문 작성</button>
                      <button onClick={() => openDoc('excel')} className="flex items-center gap-2 bg-green-50 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-semibold hover:bg-green-100"><FileSpreadsheet className="w-5 h-5" /> 견적서 작성</button>
                    </div>
                  )}
                </div>
                {renderList(activeTab === 'promotion' ? '프로모션' : activeTab === 'stadium' ? '경기장 대관' : activeTab === 'performance' ? '공연 대관' : '야구단행사')}
              </div>
            )}
          </main>

          {/* 일정 관리 (수정/삭제) 액션 모달 */}
          {actionModal.isOpen && actionModal.rental && (
            <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4" onClick={() => setActionModal({ isOpen: false, rental: null })}>
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="p-5 border-b bg-gray-50 flex justify-between items-center">
                  <h3 className="font-bold text-gray-800 flex items-center gap-2">
                    <CalendarIcon className="w-5 h-5 text-blue-600" />
                    일정 관리
                  </h3>
                  <button onClick={() => setActionModal({ isOpen: false, rental: null })} className="text-gray-400 hover:text-gray-600"><X className="w-5 h-5"/></button>
                </div>
                <div className="p-5">
                  <p className="text-sm text-gray-600 mb-5">
                    <strong>"{actionModal.rental.title}"</strong> 일정에 대해<br/>원하시는 작업을 선택해주세요.
                  </p>
                  <div className="flex flex-col gap-3">
                    <button onClick={() => handleEdit(actionModal.rental)} className="w-full flex justify-center items-center gap-2 bg-amber-50 text-amber-700 py-3 rounded-xl font-bold hover:bg-amber-100 border border-amber-200 transition-colors">
                      <Edit className="w-4 h-4"/> 등록 내용 변경 (수정)
                    </button>
                    <button onClick={() => { handleDelete(actionModal.rental); setActionModal({ isOpen: false, rental: null }); }} className="w-full flex justify-center items-center gap-2 bg-red-50 text-red-700 py-3 rounded-xl font-bold hover:bg-red-100 border border-red-200 transition-colors">
                      <Trash2 className="w-4 h-4"/> 일정 완전히 삭제
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 공문/견적서 미리보기 문서 모달 */}
          {docModal.isOpen && docModal.rental && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-gray-100 w-full max-w-4xl max-h-[90vh] rounded-xl shadow-2xl flex flex-col overflow-hidden">
                <div className="bg-white px-6 py-4 border-b flex justify-between items-center shrink-0">
                  <h3 className="text-lg font-bold flex items-center gap-2">
                    {docModal.type === 'word' ? <FileText className="text-blue-600 w-5 h-5"/> : <FileSpreadsheet className="text-green-600 w-5 h-5"/>}
                    {docModal.type === 'word' ? '수신 공문 미리보기' : '견적서 미리보기'}
                  </h3>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => exportHTMLToDoc('export-area', `${docModal.rental.recipient}_${docModal.rental.title}`, docModal.type)} 
                      className="bg-blue-600 text-white px-4 py-2 rounded flex items-center gap-2 text-sm hover:bg-blue-700 font-semibold shadow-sm"
                    >
                      <Download className="w-4 h-4"/> 
                      {docModal.type === 'word' ? 'Word(.doc) 다운로드' : 'Excel(.xls) 다운로드'}
                    </button>
                    <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded flex items-center gap-2 text-sm hover:bg-gray-700">
                      <Printer className="w-4 h-4"/> 인쇄/PDF
                    </button>
                    <button onClick={() => setDocModal({ isOpen: false, type: '', rental: null })} className="bg-gray-200 text-gray-700 p-2 rounded hover:bg-gray-300 ml-2">
                      <X className="w-5 h-5"/>
                    </button>
                  </div>
                </div>

                <div className="flex-1 overflow-auto p-8 bg-gray-200">
                  <div className="bg-white mx-auto shadow-sm text-black relative" style={{ width: '210mm', minHeight: '297mm', padding: '25mm', boxSizing: 'border-box' }}>
                    {docModal.type === 'word' 
                      ? renderWordTemplate(docModal.rental, calculateFees(docModal.rental))
                      : renderExcelTemplate(docModal.rental, calculateFees(docModal.rental))
                    }
                  </div>
                </div>
                
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
